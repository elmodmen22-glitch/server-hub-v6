name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build
        env: { VITE_API_URL: "https://server-hub-v5-wrpt.onrender.com" }

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Write secrets to file
        run: echo "$ANDROID_HOME" > /tmp/android_home.txt && ls -la "$ANDROID_HOME/platforms/" 2>&1 | tee /tmp/sdk_check.txt && ls -la "$ANDROID_HOME/build-tools/" 2>&1 | tee -a /tmp/sdk_check.txt

      - name: Build APK
        working-directory: frontend/android
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log

      - name: Upload error log to public paste
        if: failure()
        run: |
          echo "::group::Full Gradle Log"
          cat /tmp/gradle.log
          echo "::endgroup::"
          # Output error annotations
          grep -i -E "(error|FAILED|FAILURE|Exception|Build failed|Cannot|not found|missing)" /tmp/gradle.log | head -20 | while IFS= read -r line; do
            echo "::error file=gradle.log::$(echo "$line" | head -c 200)"
          done

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SERVER-HUB-APK
          path: frontend/android/app/build/outputs/apk/debug/*.apk
