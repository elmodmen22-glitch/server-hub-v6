name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Build frontend
        run: npm --prefix frontend install && npm --prefix frontend run build
        env:
          VITE_API_URL: https://server-hub-v5-wrpt.onrender.com

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK with Gradle
        working-directory: frontend/android
        continue-on-error: true
        run: |
          chmod +x gradlew
          echo "=== ENV ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version 2>&1
          echo "=== SDK ==="
          ls $ANDROID_HOME/platforms/ 2>/dev/null
          ls $ANDROID_HOME/build-tools/ 2>/dev/null
          echo "=== GRADLE ==="
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log

      - name: Upload Gradle logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: /tmp/gradle.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SERVER-HUB-APK
          path: frontend/android/app/build/outputs/apk/debug/*.apk
