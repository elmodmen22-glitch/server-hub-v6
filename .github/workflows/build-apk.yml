name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install SDK 36
        run: |
          echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-36" "build-tools;36.0.0"
          echo "SDK setup done"

      - name: Build frontend
        run: npm --prefix frontend install && npm --prefix frontend run build
        env:
          VITE_API_URL: https://server-hub-v5-wrpt.onrender.com

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          export GRADLE_OPTS="-Dorg.gradle.daemon=false"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SERVER-HUB-APK
          path: frontend/android/app/build/outputs/apk/debug/*.apk
