name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 && $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build
        env: { VITE_API_URL: "https://server-hub-v5-wrpt.onrender.com" }

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-error-log
          path: /tmp/gradle.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SERVER-HUB-APK
          path: frontend/android/app/build/outputs/apk/debug/*.apk
